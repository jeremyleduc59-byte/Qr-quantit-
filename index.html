<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>QR Quantité Pro</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1d6aff">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<script src="https://unpkg.com/@zxing/library@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/bwip-js@3/dist/bwip-js-min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Syne:wght@800&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: #f0f4f8; color: #111827; font-family: 'Inter', sans-serif; padding: 16px; }
  .card { background: #fff; border-radius: 20px; box-shadow: 0 4px 16px rgba(0,0,0,0.06); margin-bottom: 15px; overflow: hidden; border: 1px solid #dde3ec; }
  .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; background: #1d6aff; color: white; margin-top: 10px; }
  #live-view { position: relative; background: #000; width: 100%; aspect-ratio: 1/1; display: none; }
  #video { width: 100%; height: 100%; object-fit: cover; }
  .scan-frame { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 60%; height: 60%; border: 2px solid #fff; border-radius: 10px; }
  #result-card { display: none; padding: 15px; }
  .scanned-text { background: #f7f9fc; padding: 10px; border-radius: 10px; font-family: monospace; word-break: break-all; margin-top: 10px; }
</style>
</head>
<body>

<div class="card">
  <div style="padding: 15px; font-weight: 800; border-bottom: 1px solid #eee;">📷 SCANNER</div>
  <div id="live-view"><video id="video" playsinline></video><div class="scan-frame"></div></div>
  <div style="padding: 15px;">
    <button class="btn" id="btn-start" onclick="startScan()">Démarrer le Scan</button>
    <button class="btn" id="btn-stop" onclick="stopScan()" style="display:none; background:#ef4444;">Arrêter</button>
  </div>
</div>

<div class="card" id="result-card">
  <strong>Code détecté :</strong>
  <div class="scanned-text" id="raw-out"></div>
  <div id="qr-result-area" style="text-align:center; margin-top:15px;"></div>
  <button class="btn" style="background:#10b981" onclick="location.reload()">Nouveau Scan</button>
</div>

<script>
  const codeReader = new ZXing.BrowserMultiFormatReader();
  let selectedDeviceId;

  function startScan() {
    document.getElementById('live-view').style.display = 'block';
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-stop').style.display = 'block';

    codeReader.decodeFromVideoDevice(null, 'video', (result, err) => {
      if (result) {
        document.getElementById('raw-out').textContent = result.text;
        document.getElementById('result-card').style.display = 'block';
        stopScan();
        generateDataMatrix(result.text);
      }
    });
  }

  function stopScan() {
    codeReader.reset();
    document.getElementById('live-view').style.display = 'none';
    document.getElementById('btn-start').style.display = 'block';
    document.getElementById('btn-stop').style.display = 'none';
  }

  function generateDataMatrix(text) {
    const canvas = document.createElement('canvas');
    bwipjs.toCanvas(canvas, { bcid: 'datamatrix', text: text, scale: 3 });
    document.getElementById('qr-result-area').innerHTML = '';
    document.getElementById('qr-result-area').appendChild(canvas);
  }

  // Enregistrement du Service Worker pour le hors-ligne
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>
</body>
</html>
